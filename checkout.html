<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Checkout - N'EREDITÀ</title>
    <link rel="stylesheet" href="neredita.css">
</head>

<body>
<div class="overlay">

    <div class="nav">
        <div class="navigation">
            <img src="logo.png" class="logo" alt="N'EREDITÀ Logo">
        </div>

        <div class="navigation">
            <a href="index.html"><b>HOME</b></a>
            <a href="about.html"><b>ABOUT US</b></a>
            <a href="mv.html"><b>MISSION &amp; VISION</b></a>
            <a href="logoslogan.html"><b>LOGO &amp; SLOGAN</b></a>
            <a href="products.html"><b>PRODUCTS</b></a>
        </div>

        <div class="checkout">
            <a href="checkout.html">
                <img src="checkout.png" class="cart" alt="Checkout">
            </a>
        </div>
    </div>

    <h1 style="text-align: center; color: white; font-size: 70px; margin-top: 30px;">CHECKOUT</h1>

    <div style="display: flex; justify-content: space-around; align-items: flex-start; margin-top: 40px; flex-wrap: wrap;">

        <div style="width: 40%; min-width: 300px; color: white;">
            <h2 style="font-size: 35px; text-align: center;">SUMMARY OF PURCHASE</h2>

            <div id="cart-items" style="margin-top: 30px;"></div>

            <div id="cart-total" style="margin-top: 20px; text-align: center; font-size: 28px; font-weight: bold;"></div>

            <div style="text-align: center; margin-top: 20px;">
                <button type="button" onclick="clearCart()" style="padding: 12px 24px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer;">
                    CLEAR CART
                </button>
            </div>
        </div>

        <div style="width: 40%; min-width: 300px; color: white; text-align: center;">
            <h2 style="font-size: 60px; margin-bottom: 20px;">INFORMATION FILLOUT</h2>

            <form id="checkout-form">
                <input type="text" id="firstName" placeholder="FIRST NAME" style="width: 80%; padding: 15px; margin: 10px 0; font-size: 18px; text-align: center; border-radius: 5px; border: none;"><br>

                <input type="text" id="middleInitial" placeholder="MIDDLE INITIAL" style="width: 80%; padding: 15px; margin: 10px 0; font-size: 18px; text-align: center; border-radius: 5px; border: none;"><br>

                <input type="text" id="lastName" placeholder="LAST NAME" style="width: 80%; padding: 15px; margin: 10px 0; font-size: 18px; text-align: center; border-radius: 5px; border: none;"><br>

                <input type="email" id="email" placeholder="EMAIL" style="width: 80%; padding: 15px; margin: 10px 0; font-size: 18px; text-align: center; border-radius: 5px; border: none;"><br>

                <select id="deliveryOption" style="width: 80%; padding: 15px; margin: 10px 0; font-size: 18px; text-align: center; border-radius: 5px; border: none;">
                    <option value="">DELIVERY OPTION</option>
                    <option value="Delivery">Delivery</option>
                    <option value="Meet-up">Meet-up</option>
                    <option value="Pick-up">Pick-up</option>
                </select><br><br>

                <h3 style="font-size: 35px;">PAYMENT OPTION</h3>

                <select id="paymentMethod" style="width: 80%; padding: 15px; margin: 10px 0; font-size: 18px; text-align: center; border-radius: 5px; border: none;">
                    <option value="">PAYMENT METHOD</option>
                    <option value="GCash">GCash</option>
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                </select><br><br>

                <button id="confirmBtn" type="submit" style="background-color: #7ed957; color: black; font-size: 24px; font-weight: bold; padding: 15px 40px; border: none; border-radius: 20px; cursor: pointer;">
                    CONFIRM
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartContainer = document.getElementById("cart-items");
    const totalContainer = document.getElementById("cart-total");

    cartContainer.innerHTML = "";
    totalContainer.innerHTML = "";

    if (cart.length === 0) {
        cartContainer.innerHTML = "<p style='text-align:center; font-size:22px;'>Your cart is empty.</p>";
        totalContainer.innerHTML = "<p>Total: PHP 0</p>";
        return;
    }

    let grandTotal = 0;

    cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;

        cartContainer.innerHTML += `
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="${item.image}" alt="${item.productName}" width="180" style="margin-bottom: 15px;"><br>
                <p><b>Product:</b> ${item.productName}</p>
                <p><b>Size:</b> ${item.size}</p>
                <p><b>Quantity:</b> ${item.quantity}</p>
                <p><b>Price:</b> PHP ${item.price}</p>
                <p><b>Total:</b> PHP ${itemTotal}</p>

                <button type="button" onclick="removeItem(${index})" style="padding: 10px 20px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer;">
                    REMOVE
                </button>
                <hr style="margin-top: 20px;">
            </div>
        `;
    });

    totalContainer.innerHTML = `Grand Total: PHP ${grandTotal}`;
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function clearCart() {
    if (confirm("Are you sure you want to clear your cart?")) {
        localStorage.removeItem("cart");
        loadCart();
    }
}

document.getElementById("checkout-form").addEventListener("submit", async function(event) {
    event.preventDefault();

    const confirmBtn = document.getElementById("confirmBtn");
    confirmBtn.disabled = true;

    const firstName = document.getElementById("firstName").value.trim();
    const middleInitial = document.getElementById("middleInitial").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const deliveryOption = document.getElementById("deliveryOption").value;
    const paymentMethod = document.getElementById("paymentMethod").value;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Your cart is empty.");
        confirmBtn.disabled = false;
        return;
    }

    if (firstName === "" || lastName === "" || email === "" || deliveryOption === "" || paymentMethod === "") {
        alert("Please fill out all required fields.");
        confirmBtn.disabled = false;
        return;
    }

    let grandTotal = 0;
    let productSummary = "";

    cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;
        productSummary += item.productName + " | Size: " + item.size + " | Qty: " + item.quantity + " | Price: PHP " + item.price + "\n";
    });

    const orderData = {
        firstName: firstName,
        middleInitial: middleInitial,
        lastName: lastName,
        email: email,
        deliveryOption: deliveryOption,
        paymentMethod: paymentMethod,
        products: productSummary,
        total: grandTotal
    };

    try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbwoi9s4u3eAcZUrVoXJ-G7Ck_kBHBfaJTG0APX9R7VLepxGr4QACTBStXkRyc70JQ1f/exec", {
            method: "POST",
            body: JSON.stringify(orderData)
        });

        const text = await response.text();
        console.log("Server response:", text);

        localStorage.removeItem("cart");
        document.getElementById("checkout-form").reset();
        window.location.href = "orderconfirmed.html";

    } catch (error) {
        console.log("Full error:", error);
        alert("Error sending order. Check browser console.");
        confirmBtn.disabled = false;
    }
});

window.onload = loadCart;
</script>

</body>
</html>
